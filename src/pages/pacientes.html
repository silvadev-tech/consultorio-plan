<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Pacientes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<!-- Barra de navegação superior -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Clínica</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="agenda.html">Agenda</a></li>
                <li class="nav-item"><a class="nav-link active" href="pacientes.html">Pacientes</a></li>
                <li class="nav-item"><a class="nav-link" href="dentistas.html">Dentistas</a></li>
                <li class="nav-item"><a class="nav-link" href="orcamento.html">Orçamento</a></li>
                <li class="nav-item"><a class="nav-link" href="financeiro.html">Financeiro</a></li>
                <li class="nav-item"><a class="nav-link" href="suporte.html">Suporte Premium</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Conteúdo principal -->
<div class="container mt-4 pacientes-container">
    <h2>Lista de Pacientes</h2>

    <!-- Formulário de cadastro/edição -->
    <form class="paciente-form row g-3 mb-4" id="formCadastro">
        <div class="col-md-4">
            <input type="text" name="nome" class="form-control" placeholder="Nome" required />
        </div>
        <div class="col-md-4">
            <input type="email" name="email" class="form-control" placeholder="E-mail" required />
        </div>
        <div class="col-md-3">
            <input type="text" name="telefone" class="form-control" placeholder="Telefone" required />
        </div>
        <div class="col-md-1">
            <button type="submit" class="btn btn-success w-100">Cadastrar</button>
        </div>
    </form>

    <!-- Tabela de pacientes -->
    <table id="pacientes-table" class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>Nome</th>
            <th>E-mail</th>
            <th>Telefone</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <!-- Pacientes serão renderizados dinamicamente -->
        </tbody>
    </table>
</div>

<script>
    const form = document.getElementById("formCadastro");
    const tabela = document.querySelector("#pacientes-table tbody");

    form.addEventListener("submit", function(e) {
        e.preventDefault();
        const nome = form.nome.value;
        const email = form.email.value;
        const telefone = form.telefone.value;

        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${nome}</td>
            <td>${email}</td>
            <td>${telefone}</td>
            <td>
                <button class="btn btn-primary btn-sm" onclick="abrirOrcamento('${nome}')">Abrir Orçamento</button>
                <button class="btn btn-danger btn-sm" onclick="this.closest('tr').remove()">Excluir</button>
            </td>
        `;
        tabela.appendChild(tr);
        form.reset();
    });

    function abrirOrcamento(nomePaciente) {
        // Passa o nome do paciente pela URL
        window.location.href = `orcamento.html?paciente=${encodeURIComponent(nomePaciente)}`;
    }
</script>
</body>
</html>
